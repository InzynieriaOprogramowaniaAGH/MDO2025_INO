apiVersion: apps/v1
kind: Deployment
metadata:
  name: igor-nginx
spec:
  replicas: 4
  selector:
    matchLabels:
      app: igor-nginx
  template:
    metadata:
      labels:
        app: igor-nginx
    spec:
      containers:
        - name: nginx
          image: igor/nginx:v2
          ports:
            - containerPort: 80
